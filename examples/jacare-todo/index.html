<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jacaré · Todo suite</title>
    <link rel="icon" href="/jacare-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #10241a;
        --ink-soft: #2a4a38;
        --muted: #5c7a68;
        --paper: #f3f7f1;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-solid: #fbfef9;
        --line: rgba(16, 36, 26, 0.1);
        --line-strong: rgba(16, 36, 26, 0.18);
        --lime: #78c018;
        --lime-deep: #189030;
        --lime-soft: rgba(120, 192, 24, 0.16);
        --amber: #d4a017;
        --danger: #c23b2e;
        --radius: 1.1rem;
        --radius-sm: 0.75rem;
        --shadow: 0 18px 50px rgba(16, 36, 26, 0.1);
        --font: 'Outfit', system-ui, sans-serif;
        --display: 'Syne', system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.5;
        color: var(--ink);
        background: #dfeadf;
        -webkit-font-smoothing: antialiased;
      }

      .atmosphere {
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(ellipse 80% 55% at 12% -10%, rgba(120, 192, 24, 0.35), transparent 55%),
          radial-gradient(ellipse 70% 50% at 100% 0%, rgba(24, 144, 48, 0.22), transparent 50%),
          radial-gradient(ellipse 50% 40% at 50% 100%, rgba(16, 36, 26, 0.08), transparent 60%),
          linear-gradient(165deg, #e8f0e4 0%, #d5e4d4 48%, #c8d9c4 100%);
      }

      .atmosphere::after {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      .app {
        min-height: 100vh;
        padding: 1.5rem 1.25rem 2.5rem;
      }

      .layout {
        width: min(72rem, 100%);
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.75rem;
        animation: rise 0.55s ease both;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
        color: inherit;
      }

      .logo {
        height: 3.25rem;
        width: auto;
        filter: drop-shadow(0 8px 18px rgba(16, 36, 26, 0.18));
      }

      .brand-copy {
        display: grid;
        gap: 0.05rem;
      }

      .brand-name {
        font-family: var(--display);
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .brand-tag {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        gap: 0.35rem;
        padding: 0.3rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
      }

      .nav-link {
        padding: 0.45rem 0.95rem;
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      }

      .nav-link:hover {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.8);
      }

      .nav-link.jacare-here {
        color: #fff;
        background: linear-gradient(135deg, var(--lime-deep), #3faa28);
        box-shadow: 0 8px 20px rgba(24, 144, 48, 0.28);
      }

      .main {
        min-height: 22rem;
        animation: rise 0.7s ease 0.06s both;
      }

      .footer {
        margin-top: 2.25rem;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      .page {
        display: grid;
        gap: 1.15rem;
      }

      .page-hero {
        display: grid;
        gap: 0.35rem;
        max-width: 36rem;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--lime-deep);
      }

      .page-title {
        margin: 0;
        font-family: var(--display);
        font-size: clamp(2.1rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.95;
      }

      .page-lead {
        margin: 0.15rem 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        max-width: 34rem;
      }

      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .metric {
        display: grid;
        gap: 0.1rem;
        min-width: 5.5rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }

      .metric-value {
        font-family: var(--display);
        font-size: 1.45rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
      }

      .metric-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .panel {
        padding: 1rem 1.1rem;
        border-radius: var(--radius);
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .composer {
        display: grid;
        gap: 0.85rem;
      }

      .composer-compact .add-row {
        margin: 0;
      }

      .field {
        display: grid;
        gap: 0.35rem;
      }

      .field.grow {
        flex: 1;
      }

      .field-label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .search {
        position: relative;
      }

      .search .icon {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        width: 1rem;
        height: 1rem;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
      }

      .input {
        width: 100%;
        padding: 0.7rem 0.9rem;
        border-radius: 0.85rem;
        border: 1px solid var(--line-strong);
        background: var(--panel-solid);
        color: var(--ink);
        font: inherit;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .search-input {
        padding-left: 2.4rem;
      }

      .input::placeholder {
        color: #8aa394;
      }

      .input:focus {
        outline: none;
        border-color: var(--lime-deep);
        box-shadow: 0 0 0 3px var(--lime-soft);
      }

      .add-row {
        display: flex;
        align-items: end;
        gap: 0.65rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        padding: 0 1rem;
        height: 2.65rem;
        border: none;
        border-radius: 0.85rem;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        color: #fff;
        background: linear-gradient(135deg, var(--lime-deep), #3faa28);
        box-shadow: 0 10px 24px rgba(24, 144, 48, 0.28);
      }

      .btn-primary:hover {
        filter: brightness(1.05);
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid var(--line);
        color: var(--ink-soft);
      }

      .btn-ghost:hover {
        background: #fff;
      }

      .btn-tiny {
        height: 1.7rem;
        padding: 0 0.55rem;
        font-size: 0.7rem;
        border-radius: 999px;
      }

      .btn-tiny.danger {
        color: var(--danger);
      }

      .add-btn {
        flex-shrink: 0;
        min-width: 5.5rem;
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.45rem;
      }

      .list li {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0.75rem;
        padding: 0.7rem 0.8rem;
        border-radius: 0.9rem;
        border: 1px solid transparent;
        background: var(--panel-solid);
        cursor: pointer;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .list li:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        box-shadow: 0 10px 24px rgba(16, 36, 26, 0.06);
      }

      .list li.selected {
        border-color: rgba(24, 144, 48, 0.35);
        box-shadow: inset 3px 0 0 var(--lime-deep), 0 10px 24px rgba(24, 144, 48, 0.08);
      }

      .list li.done .label {
        text-decoration: line-through;
        color: var(--muted);
      }

      .item-body {
        display: grid;
        gap: 0.2rem;
        min-width: 0;
      }

      .label {
        font-size: 0.98rem;
        font-weight: 500;
      }

      .chip {
        width: fit-content;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--lime-deep);
        background: var(--lime-soft);
      }

      .check,
      .remove {
        display: grid;
        place-items: center;
        width: 1.85rem;
        height: 1.85rem;
        padding: 0;
        border-radius: 0.55rem;
        cursor: pointer;
      }

      .check {
        border: 1.5px solid var(--line-strong);
        background: #fff;
        color: transparent;
      }

      .check svg,
      .remove svg {
        width: 0.9rem;
        height: 0.9rem;
      }

      .list li.done .check {
        border-color: var(--lime-deep);
        background: var(--lime-soft);
        color: var(--lime-deep);
      }

      .remove {
        border: none;
        background: transparent;
        color: var(--muted);
      }

      .remove:hover {
        color: var(--danger);
      }

      .empty {
        padding: 2.25rem 1rem;
        text-align: center;
      }

      .empty-title {
        margin: 0;
        font-family: var(--display);
        font-size: 1.15rem;
        font-weight: 700;
      }

      .empty-copy {
        margin: 0.35rem 0 0;
        color: var(--muted);
      }

      /* Board */
      .board {
        display: grid;
        gap: 0.85rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .column {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 0.75rem;
        min-height: 22rem;
        padding: 0.9rem;
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.5);
        border: 1px dashed var(--line-strong);
        transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      }

      .column.drop {
        border-style: solid;
        border-color: var(--lime-deep);
        background: rgba(120, 192, 24, 0.12);
        transform: translateY(-2px);
      }

      .column-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 0.5rem;
      }

      .column-title {
        margin: 0;
        font-family: var(--display);
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .column-hint {
        margin: 0.15rem 0 0;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .column-count {
        display: grid;
        place-items: center;
        min-width: 1.75rem;
        height: 1.75rem;
        padding: 0 0.4rem;
        border-radius: 999px;
        background: var(--lime-soft);
        color: var(--lime-deep);
        font-size: 0.75rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .column-body {
        display: grid;
        gap: 0.55rem;
        align-content: start;
      }

      .card {
        padding: 0.8rem 0.85rem;
        border-radius: 0.85rem;
        background: var(--panel-solid);
        border: 1px solid var(--line);
        box-shadow: 0 8px 20px rgba(16, 36, 26, 0.05);
        cursor: grab;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .card:active {
        cursor: grabbing;
      }

      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(16, 36, 26, 0.1);
      }

      .card-title {
        margin: 0 0 0.55rem;
        font-size: 0.92rem;
        font-weight: 600;
        line-height: 1.35;
      }

      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      /* Match */
      .match-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1.2fr) minmax(14rem, 0.7fr);
        align-items: start;
      }

      .match-status {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .match-turn {
        margin: 0;
        font-family: var(--display);
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .match-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .grid-ttt {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.55rem;
        max-width: 22rem;
        margin: 0 auto;
      }

      .grid-ttt.over {
        opacity: 0.92;
      }

      .cell {
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 1rem;
        background: linear-gradient(160deg, #ffffff, #eef6ea);
        color: var(--ink);
        font-family: var(--display);
        font-size: clamp(1.8rem, 6vw, 2.6rem);
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      .cell:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 28px rgba(16, 36, 26, 0.12);
      }

      .cell:disabled {
        cursor: default;
      }

      .cell.x {
        color: var(--lime-deep);
        background: linear-gradient(160deg, #f4ffe8, #dff5c8);
      }

      .cell.o {
        color: #0f5f8a;
        background: linear-gradient(160deg, #eef8ff, #d7ecf8);
      }

      .cell.filled span {
        animation: pop 0.28s cubic-bezier(0.2, 0.9, 0.3, 1.2);
      }

      .aside-title {
        margin: 0 0 0.75rem;
        font-family: var(--display);
        font-size: 1.05rem;
        font-weight: 700;
      }

      .score-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.55rem;
      }

      .score-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.65rem 0.75rem;
        border-radius: 0.75rem;
        background: var(--panel-solid);
        border: 1px solid var(--line);
      }

      .score-mark {
        display: grid;
        place-items: center;
        width: 1.6rem;
        height: 1.6rem;
        border-radius: 0.45rem;
        font-family: var(--display);
        font-weight: 800;
      }

      .score-mark.x {
        background: var(--lime-soft);
        color: var(--lime-deep);
      }

      .score-mark.o {
        background: #dceef8;
        color: #0f5f8a;
      }

      .score-mark.draw {
        background: #f0ebe0;
        color: #7a6540;
      }

      .score-value {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        font-size: 1.1rem;
      }

      .aside-copy {
        margin: 0.9rem 0 0;
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.45;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 900px) {
        .board {
          grid-template-columns: 1fr;
        }

        .column {
          min-height: 0;
        }

        .match-layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .nav {
          justify-content: space-between;
        }

        .nav-link {
          flex: 1;
          text-align: center;
          padding-inline: 0.5rem;
        }

        .add-row {
          flex-direction: column;
          align-items: stretch;
        }

        .add-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/boot.js"></script>
  </body>
</html>
