<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-starter</title>
    <link rel="icon" href="/jacare-logo.png" type="image/png" />
    <style>
      :root {
        --bg: #f4f4f5;
        --surface: #ffffff;
        --border: #e4e4e7;
        --text: #18181b;
        --text-muted: #71717a;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --radius: 8px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .app { min-height: 100vh; padding: 2rem 1rem; }
      .layout { max-width: 36rem; margin: 0 auto; }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .brand { display: flex; align-items: center; gap: 0.65rem; }
      .logo { height: 3rem; width: auto; }
      .title { font-size: 1.25rem; font-weight: 600; }
      .nav { display: flex; gap: 0.25rem; }
      .nav-link {
        padding: 0.35rem 0.75rem;
        border-radius: var(--radius);
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.875rem;
      }
      .nav-link.jacare-here { color: var(--accent); background: var(--accent-soft); }
      .main { min-height: 16rem; }
      .page { display: grid; gap: 1rem; }
      .page-title { margin: 0; font-size: 1.125rem; }
      .lead { margin: 0; color: var(--text-muted); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/boot.js"></script>
  </body>
</html>
