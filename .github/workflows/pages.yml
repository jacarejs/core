name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Build todo demo
        working-directory: examples/jacare-todo
        env:
          JACARE_BASE: /core/todo/
        run: yarn build

      - name: Build showcase demo
        working-directory: examples/jacare-showcase
        env:
          JACARE_BASE: /core/showcase/
        run: yarn build

      - name: Build BMI demo
        working-directory: examples/jacare-bmi
        env:
          JACARE_BASE: /core/bmi/
        run: yarn build

      - name: Build Lab demo
        working-directory: examples/jacare-lab
        env:
          JACARE_BASE: /core/lab/
        run: yarn build

      - name: Prepare Pages site
        run: |
          mkdir -p site/todo site/showcase site/bmi site/lab
          cp scripts/gh-pages-index.html site/index.html
          cp -r examples/jacare-todo/dist/. site/todo/
          cp -r examples/jacare-showcase/dist/. site/showcase/
          cp -r examples/jacare-bmi/dist/. site/bmi/
          cp -r examples/jacare-lab/dist/. site/lab/
          cp scripts/gh-pages-404.html site/404.html
          cp scripts/gh-pages-404.html site/todo/404.html
          cp scripts/gh-pages-404.html site/showcase/404.html
          cp scripts/gh-pages-404.html site/bmi/404.html
          cp scripts/gh-pages-404.html site/lab/404.html
          touch site/.nojekyll site/todo/.nojekyll site/showcase/.nojekyll site/bmi/.nojekyll site/lab/.nojekyll

      - name: Verify Pages artifact
        run: |
          test -f site/index.html
          test -f site/404.html
          test -f site/showcase/index.html
          test -f site/todo/index.html
          test -f site/bmi/index.html
          test -f site/lab/index.html
          echo "Pages artifact:"
          find site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
