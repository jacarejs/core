name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Build todo demo
        working-directory: examples/jacare-todo
        env:
          JACARE_BASE: /core/
        run: yarn build

      - name: Build showcase demo
        working-directory: examples/jacare-showcase
        env:
          JACARE_BASE: /core/showcase/
        run: yarn build

      - name: Prepare Pages site
        run: |
          mkdir -p site/showcase
          cp -r examples/jacare-todo/dist/. site/
          cp -r examples/jacare-showcase/dist/. site/showcase/
          cp examples/jacare-todo/dist/index.html site/404.html
          cp examples/jacare-showcase/dist/index.html site/showcase/404.html
          touch site/.nojekyll site/showcase/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
