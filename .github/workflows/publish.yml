name: Publish npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build packages
        run: yarn build

      - name: Publish @jacare/core
        run: npm publish --access public
        working-directory: packages/runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/compiler
        run: npm publish --access public
        working-directory: packages/compiler
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/vite-plugin
        run: npm publish --access public
        working-directory: packages/vite-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/meta
        run: npm publish --access public
        working-directory: packages/meta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/devtools
        run: npm publish --access public
        working-directory: packages/devtools
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish create-jacare
        run: npm publish --access public
        working-directory: packages/create-jacare
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/cli
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}
