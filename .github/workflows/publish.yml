name: Publish npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with remote
        run: git pull --rebase origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Bump version
        id: version
        run: |
          VERSION=$(node scripts/sync-versions.mjs bump "${{ inputs.bump }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping to v$VERSION"

      - name: Install dependencies
        run: yarn install

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build packages
        run: yarn build

      - name: Publish @jacare/core
        run: node scripts/publish-package.mjs packages/runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/compiler
        run: node scripts/publish-package.mjs packages/compiler
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/vite-plugin
        run: node scripts/publish-package.mjs packages/vite-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/meta
        run: node scripts/publish-package.mjs packages/meta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/devtools
        run: node scripts/publish-package.mjs packages/devtools
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish create-jacare
        run: node scripts/publish-package.mjs packages/create-jacare
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Publish @jacare/cli
        run: node scripts/publish-package.mjs packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}

      - name: Commit version and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag -f "v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push
          git push origin "v${{ steps.version.outputs.version }}" --force
