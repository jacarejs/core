name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: publish-vscode
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Bump extension version
        id: version
        run: |
          VERSION=$(node scripts/sync-versions.mjs vscode bump "${{ inputs.bump }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping extension to v$VERSION"

      - name: Install dependencies
        run: yarn install

      - name: Build extension
        run: yarn build
        working-directory: packages/vscode-jacare

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish --no-dependencies
        working-directory: packages/vscode-jacare
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Commit version and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/vscode-jacare/package.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(vscode): release v${{ steps.version.outputs.version }}"
          git tag "vscode-v${{ steps.version.outputs.version }}"
          git push
          git push origin "vscode-v${{ steps.version.outputs.version }}"
